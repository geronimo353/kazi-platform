<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recherche de Candidats — Kazi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="dark">
<div x-data="rechercheApp()" style="display:flex;min-height:100vh;background:var(--bg);">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <a href="index.html" style="display:flex;align-items:center;gap:10px;font-size:17px;font-weight:800;">
      <div style="width:28px;height:28px;background:var(--gradient);border-radius:7px;display:flex;align-items:center;justify-content:center;"><svg width="13" height="13" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div>
      <span class="gradient-text">KAZI</span>
    </a>
  </div>
  <nav class="sidebar-nav" style="padding-top:16px;">
    <a href="dashboard-pme.html" class="nav-item"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Tableau de bord</a>
    <a href="recherche.html" class="nav-item active" data-page="recherche.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Rechercher des profils</a>
    <div class="nav-item"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 13.255A23.931 23.931 0 0 1 12 15c-3.183 0-6.22-.62-9-1.745"/><path d="M8 19l4-1 4 1"/><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M8 8V5a4 4 0 0 1 8 0v3"/></svg>Mes offres</div>
    <div class="nav-item"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Messages</div>
    <a href="dashboard-diplome.html" class="nav-item"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Espace diplômé</a>
  </nav>
</aside>

<!-- MAIN -->
<div class="main-content">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:14px;flex:1;">
      <div style="position:relative;flex:1;max-width:480px;">
        <svg width="16" height="16" fill="none" stroke="var(--text-muted)" stroke-width="2" viewBox="0 0 24 24" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="input" style="padding-left:38px;" placeholder="Rechercher par compétence, université, nom..." x-model="searchQuery" @input="filterCandidates()">
      </div>
      <span style="color:var(--text-muted);font-size:13px;" x-text="filtered.length + ' profil(s) trouvé(s)'"></span>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <select class="input select" style="width:auto;font-size:13px;padding:8px 30px 8px 12px;" x-model="sortBy" @change="filterCandidates()">
        <option value="score">Trier: Kazi Score ↓</option>
        <option value="recent">Plus récents</option>
        <option value="name">Alphabétique</option>
      </select>
    </div>
  </div>

  <div style="display:flex;gap:0;min-height:calc(100vh - 65px);">

    <!-- FILTER SIDEBAR -->
    <div style="width:240px;border-right:1px solid var(--border);padding:20px 16px;flex-shrink:0;overflow-y:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div style="font-weight:700;font-size:14px;">Filtres</div>
        <button class="btn btn-ghost btn-sm" style="font-size:12px;color:var(--primary-l);" @click="resetFilters()">Réinitialiser</button>
      </div>

      <!-- Province -->
      <div style="margin-bottom:20px;">
        <div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">Province</div>
        <template x-for="p in provinces" :key="p">
          <label style="display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;font-size:13px;color:var(--text-muted);">
            <input type="checkbox" class="checkbox" :value="p" x-model="filters.provinces" @change="filterCandidates()">
            <span x-text="p"></span>
          </label>
        </template>
      </div>
      <div class="divider" style="margin-bottom:20px;"></div>

      <!-- Badge -->
      <div style="margin-bottom:20px;">
        <div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">Badge Kazi</div>
        <template x-for="b in badges" :key="b.value">
          <label style="display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;font-size:13px;">
            <input type="checkbox" class="checkbox" :value="b.value" x-model="filters.badges" @change="filterCandidates()">
            <span x-text="b.label" :style="'color:'+b.color"></span>
          </label>
        </template>
      </div>
      <div class="divider" style="margin-bottom:20px;"></div>

      <!-- Kazi Score min -->
      <div style="margin-bottom:20px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
          <div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">Score minimum</div>
          <span style="font-size:13px;font-weight:700;color:var(--primary-l);" x-text="filters.scoreMin"></span>
        </div>
        <input type="range" min="0" max="100" step="5" x-model="filters.scoreMin" @input="filterCandidates()" style="width:100%;accent-color:var(--primary);">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-top:4px;"><span>0</span><span>100</span></div>
      </div>
      <div class="divider" style="margin-bottom:20px;"></div>

      <!-- Disponibilité -->
      <div style="margin-bottom:20px;">
        <div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">Disponibilité</div>
        <template x-for="d in dispos" :key="d">
          <label style="display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;font-size:13px;color:var(--text-muted);">
            <input type="checkbox" class="checkbox" :value="d" x-model="filters.dispos" @change="filterCandidates()">
            <span x-text="d"></span>
          </label>
        </template>
      </div>
      <div class="divider" style="margin-bottom:20px;"></div>

      <!-- Secteur / Université -->
      <div style="margin-bottom:20px;">
        <div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">Université</div>
        <select class="input select" style="font-size:12px;" x-model="filters.universite" @change="filterCandidates()">
          <option value="">Toutes</option>
          <option>UNIKIN</option><option>UPC</option><option>UCC</option><option>ISTA</option><option>ISC</option><option>UPN</option>
        </select>
      </div>
    </div>

    <!-- RESULTS GRID -->
    <div style="flex:1;padding:20px;overflow-y:auto;">
      <!-- Active filters chips -->
      <div x-show="activeFiltersCount > 0" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">
        <template x-for="p in filters.provinces" :key="'p'+p">
          <span style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(124,58,237,.15);color:var(--primary-l);border-radius:999px;font-size:12px;border:1px solid rgba(124,58,237,.3);">
            📍 <span x-text="p"></span>
            <button @click="filters.provinces=filters.provinces.filter(x=>x!==p);filterCandidates()" style="background:none;border:none;color:inherit;cursor:pointer;line-height:1;">×</button>
          </span>
        </template>
        <template x-for="b in filters.badges" :key="'b'+b">
          <span style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(124,58,237,.15);color:var(--primary-l);border-radius:999px;font-size:12px;border:1px solid rgba(124,58,237,.3);">
            🏅 <span x-text="b"></span>
            <button @click="filters.badges=filters.badges.filter(x=>x!==b);filterCandidates()" style="background:none;border:none;color:inherit;cursor:pointer;line-height:1;">×</button>
          </span>
        </template>
        <span x-show="filters.scoreMin > 0" style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(124,58,237,.15);color:var(--primary-l);border-radius:999px;font-size:12px;border:1px solid rgba(124,58,237,.3);">
          ⭐ Score ≥ <span x-text="filters.scoreMin"></span>
        </span>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;">
        <template x-for="c in filtered" :key="c.id">
          <div class="candidate-card">
            <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;">
              <div class="avatar-placeholder" :style="'width:52px;height:52px;font-size:15px;flex-shrink:0;background:'+c.color" x-text="c.initials"></div>
              <div style="flex:1;min-width:0;">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
                  <div style="font-weight:700;font-size:15px;" x-text="c.name"></div>
                  <div style="font-size:20px;font-weight:900;flex-shrink:0;" :style="'color:'+c.scoreColor" x-text="c.score"></div>
                </div>
                <div style="font-size:12px;color:var(--text-muted);" x-text="c.faculty + ' · ' + c.uni"></div>
                <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">📍 <span x-text="c.location"></span></div>
              </div>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;">
              <template x-for="sk in c.skills" :key="sk">
                <span class="skill-tag" style="font-size:11px;padding:2px 8px;" x-text="sk"></span>
              </template>
            </div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
              <span class="badge" :class="'badge-'+c.badge.class" x-text="c.badge.label"></span>
              <span x-show="c.verified" class="badge badge-verified">✓ Diplôme vérifié</span>
              <span style="margin-left:auto;font-size:12px;color:var(--text-muted);" x-text="c.dispo"></span>
            </div>
            <div style="display:flex;gap:8px;">
              <a href="profil.html" class="btn btn-outline btn-sm" style="flex:1;justify-content:center;">Voir profil</a>
              <button class="btn btn-gradient btn-sm" style="flex:1;justify-content:center;" @click="showToastMsg(c.name)">Inviter</button>
            </div>
          </div>
        </template>
        <div x-show="filtered.length===0" style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-muted);">
          <div style="font-size:40px;margin-bottom:16px;">🔍</div>
          <div style="font-size:16px;font-weight:600;margin-bottom:8px;">Aucun profil trouvé</div>
          <div style="font-size:14px;">Essayez d'élargir vos critères de recherche</div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<script src="assets/js/app.js"></script>
<script>
function rechercheApp() {
  const all = [
    { id:1, name:'Amisi Kabongo',    initials:'AK', color:'linear-gradient(135deg,#7c3aed,#4f46e5)', uni:'UPC',    faculty:'L3 Gestion',       location:'Kinshasa', score:87, scoreColor:'#a78bfa', skills:['Excel 🥇','Comptabilité','OHADA'], badge:{label:'🥇 Gold',class:'gold'}, verified:true,  dispo:'Disponible', badges:['gold'] },
    { id:2, name:'Marie Nzamba',     initials:'MN', color:'linear-gradient(135deg,#10b981,#059669)', uni:'ISTA',   faculty:'L3 Informatique',  location:'Kinshasa', score:92, scoreColor:'#34d399', skills:['HTML/CSS ⭐','SQL 🥇','Python'],   badge:{label:'⭐ Expert',class:'expert'}, verified:true,  dispo:'Disponible', badges:['expert'] },
    { id:3, name:'Jean-Paul Mwamba', initials:'JM', color:'linear-gradient(135deg,#f59e0b,#d97706)', uni:'UCC',   faculty:'L2 Marketing',     location:'Kinshasa', score:78, scoreColor:'#fbbf24', skills:['Marketing 🥈','Canva','Réseaux'], badge:{label:'🥈 Silver',class:'silver'}, verified:false, dispo:'Disponible', badges:['silver'] },
    { id:4, name:'Grace Lukusa',     initials:'GL', color:'linear-gradient(135deg,#3b82f6,#06b6d4)', uni:'UNIKIN', faculty:'L3 Finance',       location:'Kinshasa', score:83, scoreColor:'#60a5fa', skills:['Finance','Audit','Excel'],         badge:{label:'🥇 Gold',class:'gold'}, verified:true,  dispo:'1 mois', badges:['gold'] },
    { id:5, name:'Paul Ilunga',      initials:'PI', color:'linear-gradient(135deg,#ec4899,#be185d)', uni:'ISC',    faculty:'M1 Commerce',      location:'Lubumbashi', score:71, scoreColor:'#fbbf24', skills:['Commerce','Négociation'],    badge:{label:'🥉 Bronze',class:'bronze'}, verified:false, dispo:'Disponible', badges:['bronze'] },
    { id:6, name:'Sophie Kabasele',  initials:'SK', color:'linear-gradient(135deg,#8b5cf6,#7c3aed)', uni:'UPN',   faculty:'L3 Éducation',     location:'Kinshasa', score:88, scoreColor:'#a78bfa', skills:['Pédagogie','Word','Excel'],        badge:{label:'🥇 Gold',class:'gold'}, verified:true,  dispo:'Disponible', badges:['gold'] },
    { id:7, name:'David Banza',      initials:'DB', color:'linear-gradient(135deg,#10b981,#34d399)', uni:'ISTA',   faculty:'L2 Informatique',  location:'Kinshasa', score:65, scoreColor:'#fbbf24', skills:['Java','Base de données'],         badge:{label:'🥉 Bronze',class:'bronze'}, verified:false, dispo:'3 mois', badges:['bronze'] },
    { id:8, name:'Carine Mutombo',   initials:'CM', color:'linear-gradient(135deg,#f43f5e,#e11d48)', uni:'UPC',   faculty:'L3 RH',            location:'Kinshasa', score:80, scoreColor:'#a78bfa', skills:['RH','Recrutement','SIRH'],        badge:{label:'🥇 Gold',class:'gold'}, verified:true,  dispo:'Disponible', badges:['gold'] },
  ];
  return {
    all, filtered: [...all], searchQuery:'', sortBy:'score',
    provinces:['Kinshasa','Lubumbashi','Bukavu','Goma','Kananga'],
    badges:[ {value:'expert',label:'⭐ Expert',color:'#a78bfa'},{value:'gold',label:'🥇 Gold',color:'#fbbf24'},{value:'silver',label:'🥈 Silver',color:'#d4d4d8'},{value:'bronze',label:'🥉 Bronze',color:'#cd7f32'} ],
    dispos:['Disponible immédiatement','Sous 1 mois','Sous 3 mois'],
    filters:{ provinces:[], badges:[], scoreMin:0, dispos:[], universite:'' },
    get activeFiltersCount() { return this.filters.provinces.length+this.filters.badges.length+(this.filters.scoreMin>0?1:0)+this.filters.dispos.length+(this.filters.universite?1:0); },
    filterCandidates() {
      let res = this.all.filter(c => {
        if (this.searchQuery && !c.name.toLowerCase().includes(this.searchQuery.toLowerCase()) && !c.skills.some(s=>s.toLowerCase().includes(this.searchQuery.toLowerCase()))) return false;
        if (this.filters.provinces.length && !this.filters.provinces.some(p=>c.location.includes(p))) return false;
        if (this.filters.badges.length && !this.filters.badges.some(b=>c.badges.includes(b))) return false;
        if (c.score < this.filters.scoreMin) return false;
        if (this.filters.universite && c.uni !== this.filters.universite) return false;
        return true;
      });
      if (this.sortBy==='score') res.sort((a,b)=>b.score-a.score);
      else if (this.sortBy==='name') res.sort((a,b)=>a.name.localeCompare(b.name));
      this.filtered = res;
    },
    resetFilters() { this.filters={provinces:[],badges:[],scoreMin:0,dispos:[],universite:''}; this.searchQuery=''; this.filterCandidates(); },
    showToastMsg(name) { showToast('Invitation envoyée à ' + name + ' !','success'); },
  };
}
</script>
</body>
</html>
